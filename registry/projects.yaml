# OpenClaw 项目注册表
# 由 workspace-governance skill 管理

# ─── 工具 ───────────────────────────────────────────────
tools:
  hmos:
    description: 鸿蒙项目快捷工具 - 打包 HAP、安装、启动、日志等一站式 CLI
    created: 2026-05-28
    updated: 2026-06-08
    status: active
    location: ~/bin/hmos
    type: cli
    capabilities:
      - build
      - install
      - launch
      - run
      - clean
      - log
      - device
    dependencies:
      deveco_studio: /Applications/IDE/DevEco-Studio.app/Contents/tools
      hdc: auto-detect
    notes: |
      由栞娜和苗共同封装。
      内部调用 DevEco 的 hvigorw 进行构建，hdc 进行设备操作。
      需要在鸿蒙项目根目录下运行（包含 build-profile.json5）。

  agent:
    description: TypeScript AI Agent CLI - 基于 Anthropic API 的对话+工具调用 Agent
    created: 2026-06-08
    updated: 2026-06-08
    status: active
    location: ~/bin/agent
    source: ~/.openclaw/workspace/ts-agent-demo
    type: cli
    capabilities:
      - chat        # 自然语言对话
      - tool_use    # 工具调用（天气、计算、时间、文件搜索）
    dependencies:
      api: https://token-plan-cn.xiaomimimo.com/anthropic
      model: claude-sonnet-4-20250514
    notes: |
      由栞娜和苗创建的 Agent Demo。
      基于 Anthropic API，支持工具调用。
      需要设置 ANTHROPIC_API_KEY 环境变量。

